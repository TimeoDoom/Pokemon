<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>

    <head>
      <section>
        <label>Recherche par nom :</label>
        <input type="search" placeholder="Bulbasaur" id="searchbar">
        <label>Type :</label>
        <select id="listType">
          <!-- Chargement des types dans le JS -->
        </select>
        <label>Attaque rapide :</label>
        <select id="fastAttackslist">
          <!-- Chargement des Attaques rapides dans le JS -->
        </select>
      </section>
    </head>

    <div id="pagination">
      <button>PRÉC</button>
      <span></span>
      <button>SUIV</button>
    </div>
    <table id="pokeTable">
      <thead>
        <tr>
          <td>identifiant</td>
          <td>nom</td>
          <td>génération</td>
          <td>types</td>
          <td>endurance</td>
          <td>points d'attaque de base</td>
          <td>points de défense de base</td>
          <td>image</td>
        </tr>
      </thead>
      <tbody>
        <!-- Chargement des infos dans le JS -->
      </tbody>
    </table>

    <div class="overlay" style="display: none">
      <div class="detailsPopUp">
        <div class="header">
          <h2></h2>
          <div class="close">
            <span></span>
            <span></span>
          </div>
        </div>
        <div class="detailsContent">
          <img src="" alt="image pokemon" />
          <div class="detailsInfos">
            <p>Génération : <span id="gen"></span></p>
            <p>Types : <span id="types"></span></p>
            <p>Points d'attaque de base : <span id="ptsAttk"></span></p>
            <p>Points de défense de base : <span id="ptsDef"></span></p>
            <p>Attaques : <span id="attks"></span></p>
          </div>
        </div>
      </div>
    </div>

    <div class="imagePopUp" id="imagePopUp">
      <img
        src=""
        alt="pokemon preview"
        style="max-width: 300px; max-height: 300px; display: block"
      />
    </div>

    <script src="./js/jquery-3.7.1.min.js"></script>
    <script type="module" src="./js/script.js"></script>
  </body>
</html>
